apiVersion: v1
kind: Service
metadata:
  name: finsight-api
  namespace: finsight
  labels:
    app: finsight-api
spec:
  selector:
    app: finsight-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: finsight-frontend
  namespace: finsight
  labels:
    app: finsight-frontend
spec:
  selector:
    app: finsight-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: Namespace
metadata:
  name: finsight
