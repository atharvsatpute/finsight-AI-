apiVersion: apps/v1
kind: Deployment
metadata:
  name: finsight-api
  namespace: finsight
  labels:
    app: finsight-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: finsight-api
  template:
    metadata:
      labels:
        app: finsight-api
    spec:
      containers:
        - name: api
          image: <ECR_URL>/finsight-ai:IMAGE_TAG
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finsight-secrets
                  key: groq-api-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: finsight-api
  namespace: finsight
spec:
  selector:
    app: finsight-api
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finsight-frontend
  namespace: finsight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finsight-frontend
  template:
    metadata:
      labels:
        app: finsight-frontend
    spec:
      containers:
        - name: frontend
          image: <ECR_URL>/finsight-frontend:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: finsight-frontend
  namespace: finsight
spec:
  selector:
    app: finsight-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
