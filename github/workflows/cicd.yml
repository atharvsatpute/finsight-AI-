name: FinSight AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  ECR_BACKEND: finsight-ai-backend
  ECR_FRONTEND: finsight-ai-frontend
  EKS_CLUSTER: finsight-ai-cluster
  K8S_NAMESPACE: finsight

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: cd backend && pip install -r requirements.txt
      - run: cd backend && pytest tests/ -v --tb=short --cov=. --cov-report=xml
        env: { APP_ENV: test, GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} }
      - uses: codecov/codecov-action@v4
        with: { files: backend/coverage.xml }

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: frontend-dist, path: frontend/dist, retention-days: 1 }

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.7.0" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform init && terraform plan -no-color -var="db_password=${{ secrets.DB_PASSWORD }}"
        continue-on-error: true

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build & push backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_BACKEND:latest ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest
      - uses: actions/download-artifact@v4
        with: { name: frontend-dist, path: frontend/dist }
      - name: Build & push frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_FRONTEND:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND:latest

  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
      - run: kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
      - name: Create secrets
        run: |
          kubectl create secret generic finsight-secrets \
            --from-literal=groq-api-key=${{ secrets.GROQ_API_KEY }} \
            --from-literal=news-api-key=${{ secrets.NEWS_API_KEY }} \
            --from-literal=db-password=${{ secrets.DB_PASSWORD }} \
            --namespace=$K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy manifests
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/service.yaml
          kubectl apply -f infra/k8s/deployment.yaml
      - run: kubectl rollout status deployment/finsight-api -n $K8S_NAMESPACE --timeout=300s
      - run: kubectl rollout status deployment/finsight-frontend -n $K8S_NAMESPACE --timeout=300s
      - run: kubectl get pods -n $K8S_NAMESPACE && kubectl get svc -n $K8S_NAMESPACE

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/health)
          if [ "$STATUS" != "200" ]; then echo "FAILED $STATUS"; exit 1; fi
          echo "Health check passed"
